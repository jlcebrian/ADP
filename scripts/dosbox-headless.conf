# Headless DOSBox-X config for automated ADP runs (test harness + manual).
# The key setting is "quit warning = false": otherwise DOSBox-X pops a confirm
# dialog on the host desktop every time it exits, even under a dummy video
# driver. The rest pins an SB16 and a fixed mixer rate so audio captures are
# reproducible; unspecified options keep DOSBox-X defaults.
[dosbox]
quit warning = false
machine = svga_s3

[mixer]
nosound = false
rate = 48000
blocksize = 1024
prebuffer = 25

[sblaster]
sbtype = sb16
sbbase = 220
irq = 7
dma = 1
hdma = 5
